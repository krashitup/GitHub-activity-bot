<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="page">
        <section class="panel wide-panel">
            <h1>Search Results</h1>

            <div class="search-box" style="margin: 20px 0; padding: 15px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px;">
                <form action="/search" method="get" style="display: flex; gap: 10px;">
                    <input type="text" name="q" value="{{ query }}" placeholder="Search commit messages..." required style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                    <button type="submit" style="padding: 10px 20px; background: #0366d6; color: #fff; border: none; border-radius: 4px; cursor: pointer;">Search</button>
                </form>
            </div>

            <div class="actions" style="margin-bottom: 20px;">
                <a class="button-link" href="/report">Back to Report</a>
            </div>

            <h2>Results for "{{ query }}"</h2>

            {% if results %}
                <ul style="list-style-type: none; padding: 0;">
                {% for commit in results %}
                    <li style="margin-bottom: 10px; padding: 15px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px;">
                        <span style="font-weight: bold; color: #586069; display: block; margin-bottom: 5px;">{{ commit.date }}</span>
                        <span style="font-size: 1.1em;">{{ commit.message }}</span>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p class="empty-message">No commits found matching your search.</p>
            {% endif %}

        </section>
    </main>
</body>
</html>
