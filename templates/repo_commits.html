<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Commits</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="page">
        <section class="panel wide-panel">
            <h1>Repository: {{ repo_data.repo_name }}</h1>

            <div class="actions">
                <a class="button-link" href="/report">Back to Report</a>
            </div>

            <h2>Commits</h2>

            {% if repo_data.commits %}
                <ul>
                {% for commit in repo_data.commits %}
                    <li>
                        <span>{{ commit.date }}</span>
                        <span>{{ commit.message }}</span>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p class="empty-message">No commits found for this repository.</p>
            {% endif %}

        </section>
    </main>
</body>
</html>
